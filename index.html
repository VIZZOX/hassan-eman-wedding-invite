<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hassan Ali Nawaz & Eman Pervaz — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@700;900&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Noto+Nastaliq+Urdu:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#050403;
    --navy:#0d0906;
    --navy-light:#171009;
    --gold:#d4af6a;
    --gold-bright:#f3d99b;
    --gold-dim:#8a6f3d;
    --cream:#f3ecdd;
    --ink:#c9cede;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:var(--navy-deep);
    overflow-x:hidden;
    font-family:'Montserrat',sans-serif;
  }
  body{
    -webkit-tap-highlight-color:transparent;
  }

  .music-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    width:48px;
    height:48px;
    border-radius:50%;
    background:linear-gradient(180deg, rgba(23,17,10,0.9), rgba(6,4,2,0.95));
    border:1px solid rgba(212,175,106,0.6);
    color:var(--gold-bright);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:100;
    box-shadow:0 4px 16px rgba(0,0,0,0.6);
    transition:color .25s ease, border-color .25s ease, transform .2s ease;
  }
  .music-toggle:active{ transform:scale(0.92); }
  .music-toggle svg{ width:22px; height:22px; }
  .music-toggle.muted{ color:var(--ink); opacity:0.55; }
  .music-toggle.playing{
    color:var(--gold-bright);
    border-color:var(--gold);
    animation:musicPulse 2.6s ease-in-out infinite;
  }
  @keyframes musicPulse{
    0%,100%{ box-shadow:0 4px 16px rgba(0,0,0,0.5), 0 0 0 rgba(212,175,106,0.3); }
    50%{ box-shadow:0 4px 16px rgba(0,0,0,0.5), 0 0 14px rgba(212,175,106,0.5); }
  }
  ::selection{background:var(--gold-dim);color:var(--cream);}

  /* ===================== STAGE / GATE SCREEN ===================== */
  #stage{
    position:fixed;
    inset:0;
    width:100%;
    height:100dvh;
    z-index:50;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, rgba(212,175,106,0.10), transparent 55%),
      radial-gradient(ellipse 90% 50% at 50% 100%, rgba(15,10,6,0.6), transparent 60%),
      linear-gradient(180deg, #0a0705 0%, #050403 40%, #040302 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    perspective:1600px;
    transition: opacity 1.2s ease 1s, visibility 1.2s ease 1s;
  }
  #stage.opened{
    pointer-events:none;
    opacity: 0;
    visibility: hidden;
  }

  #stage::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:3px 3px;
    opacity:0.5;
    pointer-events:none;
  }

  .fairy-lights{
    position:absolute;
    top:0; left:0; right:0;
    height:130px;
    pointer-events:none;
    z-index:2;
  }
  .fairy-lights svg{width:100%;height:100%;display:block;}
  .bulb{
    animation:twinkle 3.2s ease-in-out infinite;
    filter:drop-shadow(0 0 6px rgba(243,217,155,0.9)) drop-shadow(0 0 14px rgba(212,175,106,0.5));
  }
  @keyframes twinkle{
    0%,100%{opacity:0.35; r:2.2;}
    50%{opacity:1; r:3.4;}
  }

  .petal-field{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
  }
  #invite .petal-field{
    position:fixed;
    z-index:0;
  }

  .gate-wrap{
    position:relative;
    width:min(90vw, 420px);
    height:min(80vh, 660px);
    z-index:5;
  }

  .gate-frame-glow{
    position:absolute;
    inset:-20px;
    border-radius:50% 50% 6px 6px / 34% 34% 4px 4px;
    background:radial-gradient(ellipse at 50% 14%, rgba(212,175,106,0.22), transparent 68%);
    filter:blur(8px);
    pointer-events:none;
  }

  .apex-glow{
    position:absolute;
    top:-6%;
    left:50%;
    width:220px;
    height:220px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(243,217,155,0.5) 0%, rgba(212,175,106,0.18) 40%, transparent 72%);
    filter:blur(4px);
    pointer-events:none;
    z-index:4;
    animation:apexPulse 4.5s ease-in-out infinite;
  }
  @keyframes apexPulse{
    0%,100%{ opacity:0.65; }
    50%{ opacity:1; }
  }

  .gate-crest{
    position:absolute;
    top:-3.5%;
    left:50%;
    transform:translateX(-50%);
    width:76px;
    z-index:7;
    filter:drop-shadow(0 0 10px rgba(243,217,155,0.6));
    transition:opacity .4s ease;
  }
  #stage.opened .gate-crest{ opacity:0; }

  .door{
    position:absolute;
    top:0;
    width:50%;
    height:100%;
    transform-style:preserve-3d;
    transition:transform 3.5s cubic-bezier(.19,.82,.24,1), opacity 1s ease 2.5s;
    will-change:transform;
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
  }
  .door-left{ left:0; transform-origin:left center; }
  .door-right{ right:0; transform-origin:right center; }

  #stage.opened .door-left{ transform:rotateY(-112deg) translateZ(-10px); opacity:0; }
  #stage.opened .door-right{ transform:rotateY(112deg) translateZ(-10px); opacity:0; }

  .door svg{
    width:100%;
    height:100%;
    display:block;
    filter:drop-shadow(0 0 22px rgba(0,0,0,0.6));
  }

  .door-edge{
    position:absolute;
    top:0;
    width:20px;
    height:100%;
    background:linear-gradient(90deg, #f6dfae 0%, #d4af6a 20%, #8a6f3d 50%, #120e08 100%);
  }
  .door-left .door-edge{ right:0; transform-origin:right center; transform:rotateY(90deg); }
  .door-right .door-edge{ left:0; transform-origin:left center; transform:rotateY(-90deg); }

  .tap-enter{
    position:absolute;
    bottom:6.5%;
    left:50%;
    transform:translateX(-50%);
    z-index:6;
    font-family:'Cinzel', serif;
    letter-spacing:4px;
    font-size:12.5px;
    color:var(--gold-bright);
    text-transform:uppercase;
    animation:blink 2.1s ease-in-out infinite;
    white-space:nowrap;
    text-shadow:0 0 12px rgba(243,217,155,0.55);
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }
  #stage.opened .tap-enter{ transition:opacity .4s ease; opacity:0; }

  /* ===================== INVITATION CONTENT ===================== */
  #invite{
    position:relative;
    z-index:1;
    min-height:100vh;
    background:
      radial-gradient(ellipse 100% 40% at 50% 0%, rgba(212,175,106,0.08), transparent 60%),
      linear-gradient(180deg, #050403 0%, #0d0906 30%, #050403 100%);
    color:var(--ink);
    overflow:hidden;
  }

  .section{
    position:relative;
    padding:80px 24px 100px;
    text-align:center;
    z-index:1;
  }
  .section:not(:last-of-type)::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:0;
    width:1px;
    height:64px;
    background:linear-gradient(180deg, rgba(212,175,106,0.5), transparent);
    transform:translateX(-50%);
  }

  .divider{
    width:100%;
    max-width:220px;
    margin:26px auto;
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:center;
    opacity:0.8;
  }
  .divider .line{ height:1px; flex:1; background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);}
  .divider .diamond{
    width:6px;height:6px;
    background:var(--gold);
    transform:rotate(45deg);
    box-shadow:0 0 8px rgba(212,175,106,0.7);
  }

  .hero{ padding-top:96px; }
  .hero .bismillah{
    font-family:'Noto Nastaliq Urdu', serif;
    font-size:22px;
    color:var(--gold-bright);
    opacity:0.9;
    margin-bottom:20px;
    text-shadow:0 0 14px rgba(212,175,106,0.3);
  }
  .hero .eyebrow{
    font-family:'Cinzel', serif;
    font-size:10.5px;
    letter-spacing:5px;
    text-transform:uppercase;
    color:var(--gold-dim);
    margin-bottom:18px;
  }
  .hero .names{
    font-family:'Cinzel', serif;
    font-weight:700;
    line-height:1.2;
    font-size:clamp(2rem, 8vw, 3.2rem);
    color:transparent;
    background:linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 55%, var(--gold-dim) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    text-shadow:0 0 30px rgba(212,175,106,0.18);
  }
  .hero .amp{
    display:block;
    font-family:'Cinzel', serif;
    font-style:italic;
    font-weight:400;
    font-size:clamp(1.4rem, 6vw, 2rem);
    color:var(--gold-dim);
    margin:10px 0;
  }
  .hero .tagline{
    margin-top:22px;
    font-weight:300;
    font-size:14px;
    letter-spacing:1.5px;
    color:var(--ink);
    opacity:0.85;
    line-height:1.8;
    max-width:320px;
    margin-left:auto;
    margin-right:auto;
  }

  /* DETAILS CARD */
  .detail-cards{
    display:flex;
    flex-direction:column;
    gap:16px;
    max-width:380px;
    margin:0 auto;
  }
  .detail-card{
    border:1px solid rgba(212,175,106,0.22);
    background:rgba(23,17,10,0.45);
    padding:22px 18px;
    text-align:left;
    display:flex;
    gap:16px;
    align-items:flex-start;
  }
  .detail-title{
    font-family:'Cinzel', serif;
    font-size:12.5px;
    letter-spacing:2px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .detail-text{ font-size:13px; font-weight:300; line-height:1.7; color:var(--ink); opacity:0.85; }

  footer{
    padding:50px 24px 60px;
    text-align:center;
  }
  footer .monogram{
    font-family:'Cinzel', serif;
    font-size:14px;
    letter-spacing:6px;
    color:var(--gold-dim);
  }
</style>
</head>
<body>

<!-- ===================== BACKGROUND MUSIC ===================== -->
<audio id="bgMusic" loop playsinline preload="auto">
  <source src="inaam.mp3" type="audio/mpeg">
  <source src="inaam.mp4" type="audio/mp4">
  <source src="songs/inaam.mp3" type="audio/mpeg">
  <source src="songs/inaam.mp4" type="audio/mp4">
</audio>

<button id="musicToggle" class="music-toggle muted" aria-label="Toggle background music">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 18V5l12-2v13"></path>
    <circle cx="6" cy="18" r="3"></circle>
    <circle cx="18" cy="16" r="3"></circle>
  </svg>
</button>

<!-- ===================== GATE / OPENING STAGE ===================== -->
<div id="stage">
  <div class="gate-wrap">
    <div class="gate-frame-glow"></div>
    <div class="apex-glow"></div>

    <!-- LEFT DOOR -->
    <div class="door door-left">
      <svg viewBox="0 0 200 640" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="640" fill="#120e08" stroke="#d4af6a" stroke-width="2"/>
        <path d="M20,20 L180,20 L180,620 L20,620 Z" fill="none" stroke="#d4af6a" stroke-width="1" opacity="0.5"/>
        <circle cx="170" cy="320" r="8" fill="#d4af6a"/>
      </svg>
      <div class="door-edge"></div>
    </div>

    <!-- RIGHT DOOR -->
    <div class="door door-right">
      <svg viewBox="0 0 200 640" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="640" fill="#120e08" stroke="#d4af6a" stroke-width="2"/>
        <path d="M20,20 L180,20 L180,620 L20,620 Z" fill="none" stroke="#d4af6a" stroke-width="1" opacity="0.5"/>
        <circle cx="30" cy="320" r="8" fill="#d4af6a"/>
      </svg>
      <div class="door-edge"></div>
    </div>

    <div class="tap-enter">Tap to Open Invitation</div>
  </div>
</div>

<!-- ===================== INVITATION CONTENT ===================== -->
<div id="invite">
  <section class="section hero">
    <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
    <div class="eyebrow">Together with their families</div>
    <h1 class="names">
      Hassan Ali Nawaz
      <span class="amp">&amp;</span>
      Eman Pervaz
    </h1>
    <div class="divider">
      <div class="line"></div>
      <div class="diamond"></div>
      <div class="line"></div>
    </div>
    <p class="tagline">Request the honor of your presence to celebrate their wedding ceremony.</p>
  </section>

  <section class="section">
    <div class="detail-cards">
      <div class="detail-card">
        <div>
          <div class="detail-title">Wedding Event</div>
          <div class="detail-text">Join us for an unforgettable evening filled with love, laughter, and celebration.</div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="monogram">H &amp; E</div>
  </footer>
</div>

<!-- ===================== SCRIPT ===================== -->
<script>
  const audio = document.getElementById('bgMusic');
  const musicToggle = document.getElementById('musicToggle');
  const stage = document.getElementById('stage');

  function playAudio() {
    audio.play().then(() => {
      musicToggle.classList.remove('muted');
      musicToggle.classList.add('playing');
    }).catch(err => {
      console.log("Autoplay blocked or audio file missing:", err);
    });
  }

  function pauseAudio() {
    audio.pause();
    musicToggle.classList.add('muted');
    musicToggle.classList.remove('playing');
  }

  function toggleAudio(e) {
    if (e) e.stopPropagation();
    if (audio.paused) {
      playAudio();
    } else {
      pauseAudio();
    }
  }

  function openInvitation() {
    stage.classList.add('opened');
    playAudio();
  }

  stage.addEventListener('click', openInvitation);
  musicToggle.addEventListener('click', toggleAudio);
</script>

</body>
</html>
